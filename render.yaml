services:
  - type: web
    name: healspace-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci && npx prisma generate
    startCommand: sh scripts/render-start.sh
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: TRUST_PROXY_HOPS
        value: 1

      - key: DATABASE_URL
        fromDatabase:
          name: healspace-db
          property: connectionString

      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN_DAYS
        value: 7

      - key: SESSION_ACTIVITY_TOUCH_MINUTES
        value: 5
      - key: SESSION_CLEANUP_RETENTION_DAYS
        value: 30

      - key: JSON_BODY_LIMIT
        value: 1mb
      - key: URLENCODED_BODY_LIMIT
        value: 256kb

      - key: RATE_LIMIT_ENABLED
        value: true

      - key: GLOBAL_RATE_LIMIT_WINDOW_MINUTES
        value: 15
      - key: GLOBAL_RATE_LIMIT_MAX
        value: 1000

      - key: LOGIN_RATE_LIMIT_WINDOW_MINUTES
        value: 15
      - key: LOGIN_RATE_LIMIT_MAX
        value: 5

      - key: REGISTER_RATE_LIMIT_WINDOW_MINUTES
        value: 60
      - key: REGISTER_RATE_LIMIT_MAX
        value: 20

      - key: REFRESH_RATE_LIMIT_WINDOW_MINUTES
        value: 15
      - key: REFRESH_RATE_LIMIT_MAX
        value: 30

      - key: PASSWORD_RESET_RATE_LIMIT_WINDOW_MINUTES
        value: 15
      - key: PASSWORD_RESET_RATE_LIMIT_MAX
        value: 10

      - key: EMAIL_VERIFICATION_RATE_LIMIT_WINDOW_MINUTES
        value: 60
      - key: EMAIL_VERIFICATION_RATE_LIMIT_MAX
        value: 10

      - key: MEDIA_UPLOAD_RATE_LIMIT_WINDOW_MINUTES
        value: 60
      - key: MEDIA_UPLOAD_RATE_LIMIT_MAX
        value: 30

      - key: MAIL_TRANSPORT
        value: smtp
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM_NAME
        value: HealSpace
      - key: MAIL_FROM_ADDRESS
        sync: false

      - key: PASSWORD_RESET_URL
        sync: false
      - key: PASSWORD_RESET_TOKEN_TTL_MINUTES
        value: 15

      - key: EMAIL_VERIFICATION_URL
        sync: false
      - key: EMAIL_VERIFICATION_TOKEN_TTL_MINUTES
        value: 1440
      - key: EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS
        value: 60

      - key: GROUP_INVITATION_TTL_HOURS
        value: 168

      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_MEDIA_FOLDER
        value: healspace/media
      - key: RUN_CLOUDINARY_TESTS
        value: false

      - key: LOG_LEVEL
        value: info
      - key: EXPOSE_ERROR_DETAILS
        value: false
      - key: SECURITY_TEST_MODE
        value: false

databases:
  - name: healspace-db
    databaseName: healspace
    user: healspace
    plan: starter
