sonar.projectKey=healspace-backend
sonar.projectName=HealSpace Backend
sonar.projectVersion=1.0.0

sonar.sourceEncoding=UTF-8

sonar.sources=src,core
sonar.tests=scripts

sonar.test.inclusions=scripts/test-*.js
sonar.exclusions=\
  node_modules/**,\
  generated/**,\
  coverage/**,\
  dist/**,\
  build/**,\
  prisma/migrations/**,\
  docs/**,\
  *.config.js,\
  Dockerfile,\
  docker-compose*.yml

sonar.javascript.lcov.reportPaths=coverage/lcov.info
