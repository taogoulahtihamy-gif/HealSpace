stages:
  - validate
  - quality
  - test
  - sonar
  - docker

default:
  image: node:20-bookworm-slim
  interruptible: true
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

variables:
  NODE_ENV: "test"
  PORT: "5000"
  CLIENT_URL: "http://localhost:5173"
  CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:5000"
  TRUST_PROXY_HOPS: "0"

  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/healspace?schema=public"

  JWT_SECRET: "healspace_ci_jwt_secret_replace_in_protected_variables"
  JWT_ACCESS_EXPIRES_IN: "15m"
  JWT_REFRESH_EXPIRES_IN_DAYS: "7"

  SESSION_ACTIVITY_TOUCH_MINUTES: "5"
  SESSION_CLEANUP_RETENTION_DAYS: "30"

  JSON_BODY_LIMIT: "1mb"
  URLENCODED_BODY_LIMIT: "256kb"

  RATE_LIMIT_ENABLED: "false"

  GLOBAL_RATE_LIMIT_WINDOW_MINUTES: "15"
  GLOBAL_RATE_LIMIT_MAX: "2000"

  LOGIN_RATE_LIMIT_WINDOW_MINUTES: "15"
  LOGIN_RATE_LIMIT_MAX: "5"

  REGISTER_RATE_LIMIT_WINDOW_MINUTES: "60"
  REGISTER_RATE_LIMIT_MAX: "20"

  REFRESH_RATE_LIMIT_WINDOW_MINUTES: "15"
  REFRESH_RATE_LIMIT_MAX: "30"

  PASSWORD_RESET_RATE_LIMIT_WINDOW_MINUTES: "15"
  PASSWORD_RESET_RATE_LIMIT_MAX: "10"

  EMAIL_VERIFICATION_RATE_LIMIT_WINDOW_MINUTES: "60"
  EMAIL_VERIFICATION_RATE_LIMIT_MAX: "10"

  MEDIA_UPLOAD_RATE_LIMIT_WINDOW_MINUTES: "60"
  MEDIA_UPLOAD_RATE_LIMIT_MAX: "30"

  MAIL_TRANSPORT: "json"
  MAIL_FROM_NAME: "HealSpace"
  MAIL_FROM_ADDRESS: "no-reply@healspace.local"

  PASSWORD_RESET_URL: "http://localhost:5173/reset-password"
  PASSWORD_RESET_TOKEN_TTL_MINUTES: "15"

  EMAIL_VERIFICATION_URL: "http://localhost:5173/verify-email"
  EMAIL_VERIFICATION_TOKEN_TTL_MINUTES: "1440"
  EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS: "60"

  GROUP_INVITATION_TTL_HOURS: "168"

  CLOUDINARY_CLOUD_NAME: ""
  CLOUDINARY_API_KEY: ""
  CLOUDINARY_API_SECRET: ""
  CLOUDINARY_MEDIA_FOLDER: "healspace/media"
  RUN_CLOUDINARY_TESTS: "false"

  LOG_LEVEL: "debug"
  EXPOSE_ERROR_DETAILS: "true"
  SECURITY_TEST_MODE: "false"

  PRISMA_GENERATE_ON_START: "false"
  PRISMA_MIGRATE_ON_START: "false"
  WAIT_FOR_DATABASE: "true"
  DATABASE_WAIT_TIMEOUT_MS: "60000"

validate:
  stage: validate
  script:
    - npx prisma validate
    - npx prisma generate
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - node_modules/.prisma/client

quality:
  stage: quality
  script:
    - npm run lint
    - npm run format:check
    - npm run quality:config

test_backend:
  stage: test
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_DB: "healspace"
    POSTGRES_USER: "postgres"
    POSTGRES_PASSWORD: "postgres"
  script:
    - chmod +x scripts/ci-run-tests.sh
    - sh scripts/ci-run-tests.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - ci-server.log

test_security:
  stage: test
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_DB: "healspace"
    POSTGRES_USER: "postgres"
    POSTGRES_PASSWORD: "postgres"
    RATE_LIMIT_ENABLED: "true"
    SECURITY_TEST_MODE: "true"
  script:
    - npx prisma generate
    - npx prisma migrate deploy
    - chmod +x scripts/ci-run-security.sh
    - sh scripts/ci-run-security.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - ci-security.log

sonarqube:
  stage: sonar
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  before_script: []
  script:
    - sonar-scanner
  allow_failure: true
  rules:
    - if: "$SONAR_HOST_URL && $SONAR_TOKEN"
    - when: manual

docker_build:
  stage: docker
  image: docker:27-cli
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  before_script: []
  script:
    - docker version
    - docker build -t healspace-backend:${CI_COMMIT_SHORT_SHA} .
  rules:
    - if: "$CI_COMMIT_BRANCH"
